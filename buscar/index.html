<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Busca menú · Buscamenú</title>
  <meta name="description" content="Buscador de menús del día por localidad, restaurante, plato y precio.">

  <style>
    :root {
      --bg: #f6f1e8;
      --ink: #2f241b;
      --muted: #7a685a;
      --line: #e4d5c4;
      --accent: #b06f32;
      --accent-dark: #714219;
      --green: #2f7d46;
      --shadow: 0 18px 50px rgba(64, 43, 24, .12);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(176,111,50,.16), transparent 32rem),
        linear-gradient(180deg, #fff7eb 0%, var(--bg) 45%, #efe3d3 100%);
      min-height: 100vh;
    }

    a { color: inherit; }

    .page {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 48px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
      letter-spacing: -.03em;
      text-decoration: none;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 13px;
      background: var(--accent);
      color: white;
      display: grid;
      place-items: center;
      box-shadow: 0 8px 24px rgba(176,111,50,.25);
    }

    .crumb {
      color: var(--muted);
      font-size: 14px;
      text-align: right;
    }

    .hero,
    .filters,
    .card,
    .empty,
    .error {
      background: rgba(255,250,242,.9);
      border: 1px solid rgba(228,213,196,.95);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: clamp(24px, 4vw, 44px);
      margin-bottom: 22px;
    }
.demo-map {
  position: relative;
  min-height: 280px;
  margin: 22px 0;
  border-radius: var(--radius);
  border: 1px solid rgba(228,213,196,.95);
  box-shadow: var(--shadow);
  overflow: hidden;
  background:
    linear-gradient(135deg, rgba(176,111,50,.12), rgba(47,125,70,.10)),
    repeating-linear-gradient(45deg, rgba(255,255,255,.55) 0 18px, rgba(242,225,205,.45) 18px 36px);
}

.demo-map::before {
  content: "";
  position: absolute;
  inset: 24px;
  border: 2px dashed rgba(176,111,50,.22);
  border-radius: 30px;
}

.map-pin {
  position: absolute;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: 0;
  border-radius: 999px;
  padding: 10px 13px;
  background: white;
  color: var(--ink);
  font: inherit;
  font-weight: 900;
  box-shadow: 0 10px 28px rgba(64,43,24,.16);
  cursor: pointer;
}

.map-pin::before {
  content: "";
  width: 13px;
  height: 13px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 0 5px rgba(47,125,70,.16);
}

.pin-casa-pepe {
  left: 12%;
  top: 28%;
}

.pin-focaccia {
  left: 46%;
  top: 52%;
}

.pin-pivo {
  right: 13%;
  top: 32%;
}

.map-label {
  position: absolute;
  left: 24px;
  bottom: 20px;
  color: var(--muted);
  font-weight: 800;
  background: rgba(255,250,242,.82);
  padding: 10px 13px;
  border-radius: 14px;
}

@media (max-width: 700px) {
  .demo-map {
    min-height: 340px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .map-pin {
    position: static;
    margin: 14px;
  }

  .map-label {
    position: static;
    margin: 6px 14px 14px;
  }
}
    h1 {
      font-size: clamp(40px, 7vw, 72px);
      line-height: .95;
      letter-spacing: -.07em;
      margin: 0 0 12px;
    }

    .subtitle {
      color: var(--muted);
      font-size: clamp(18px, 2vw, 22px);
      line-height: 1.45;
      max-width: 780px;
      margin: 0;
    }

    .filters {
      display: grid;
      grid-template-columns: 1.2fr 1.2fr .7fr;
      gap: 14px;
      margin: 22px 0;
      padding: 18px;
    }

    .field { display: grid; gap: 7px; }

    label {
      font-size: 13px;
      font-weight: 900;
      color: var(--accent-dark);
      text-transform: uppercase;
      letter-spacing: .09em;
    }

    input[type="search"],
    input[type="number"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: white;
      color: var(--ink);
      font: inherit;
      font-size: 17px;
      padding: 14px 15px;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(176,111,50,.14);
    }

    .checks {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      grid-column: 1 / -1;
    }

    .check {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: white;
      color: var(--muted);
      font-weight: 750;
      text-transform: none;
      letter-spacing: 0;
      font-size: 14px;
    }

    .check input { accent-color: var(--accent); }

    .summary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      margin: 0 0 14px;
      font-weight: 750;
    }

    .results { display: grid; gap: 16px; }

    .card {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      padding: 22px;
    }

    .card h2 {
      margin: 0 0 6px;
      font-size: 28px;
      letter-spacing: -.04em;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 0 14px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      background: #f2e1cd;
      color: var(--accent-dark);
      padding: 7px 10px;
      font-size: 13px;
      font-weight: 800;
    }

    .menus {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .menu-block {
      background: white;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
    }

    .menu-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 10px;
      margin-bottom: 10px;
    }

    .menu-name {
      font-size: 19px;
      font-weight: 900;
      letter-spacing: -.02em;
    }

    .menu-price {
      flex: 0 0 auto;
      color: white;
      background: var(--accent-dark);
      border-radius: 14px;
      padding: 8px 11px;
      font-weight: 950;
      white-space: nowrap;
    }

    .columns {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .section-title {
      font-weight: 900;
      margin: 0 0 5px;
      color: var(--accent-dark);
      font-size: 14px;
    }

    ul {
      margin: 0;
      padding-left: 19px;
      line-height: 1.65;
    }

    .included {
      margin: 12px 0 0;
      padding: 10px 12px;
      border-radius: 14px;
      background: #f2e1cd;
      color: var(--accent-dark);
      font-weight: 800;
    }

    .match {
      margin-top: 10px;
      color: var(--green);
      font-weight: 850;
    }

    .actions {
      display: flex;
      align-items: flex-start;
    }

    .button {
      text-decoration: none;
      border-radius: 16px;
      padding: 13px 16px;
      background: var(--green);
      color: white;
      font-weight: 900;
      white-space: nowrap;
    }

    .empty,
    .error {
      padding: 24px;
      color: var(--muted);
    }

    .error {
      color: #8a2f20;
      background: #fff0ed;
    }

    footer {
      margin-top: 30px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 880px) {
      .filters,
      .card,
      .columns {
        grid-template-columns: 1fr;
      }

      .actions { align-items: stretch; }

      .button {
        display: block;
        text-align: center;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="topbar">
      <a class="brand" href="../">
        <span class="brand-mark">🍽️</span>
        <span>Buscamenú</span>
      </a>
      <div class="crumb" id="locationLabel">Buscador de menús</div>
    </header>

    <section class="hero">
  <h1>Busca menú</h1>
  <p class="subtitle">
    load(); plato o precio.
  </p>
</section>
<section class="demo-map" aria-label="Restaurantes en Hoyo de Manzanares">
  <button class="map-pin pin-casa-pepe" type="button" data-restaurant="Casa Pepe Demo">
    Casa Pepe Demo
  </button>

  <button class="map-pin pin-focaccia" type="button" data-restaurant="Focaccia Demo">
    Focaccia Demo
  </button>

  <button class="map-pin pin-pivo" type="button" data-restaurant="Pivo Demo">
    Pivo Demo
  </button>

  <div class="map-label">
    Restaurantes con menú publicado hoy
  </div>
</section>
    <section class="filters" aria-label="Filtros de búsqueda">
      <div class="field">
        <label for="restaurant">Restaurante</label>
        <input id="restaurant" type="search">
      </div>

      <div class="field">
        <label for="dish">Plato o ingrediente</label>
        <input id="dish" type="search">
      </div>

      <div class="field">
        <label for="price">Precio máximo</label>
        <input id="price" type="number" min="0" step="0.5">
      </div>

      <div class="checks">
        <label class="check">
          <input id="updatedOnly" type="checkbox">
          Solo menús de hoy
        </label>

        <label class="check">
          <input id="withDrink" type="checkbox">
          Bebida incluida
        </label>

        <label class="check">
          <input id="withBread" type="checkbox">
          Pan incluido
        </label>
      </div>
    </section>

    <div class="summary">
      <span id="countLabel">Cargando menús...</span>
      <span id="dateLabel"></span>
    </div>

    <section id="results" class="results" aria-live="polite"></section>

    <footer>
      Buscamenú · Menús del día en Hoyo de Manzanares.
    </footer>
  </main>

  <script>
    const state = {
      all: [],
      filtered: [],
      dataDate: '',
      localidad: null
    };

    const els = {
      restaurant: document.getElementById('restaurant'),
      dish: document.getElementById('dish'),
      price: document.getElementById('price'),
      updatedOnly: document.getElementById('updatedOnly'),
      withDrink: document.getElementById('withDrink'),
      withBread: document.getElementById('withBread'),
      results: document.getElementById('results'),
      countLabel: document.getElementById('countLabel'),
      dateLabel: document.getElementById('dateLabel'),
      locationLabel: document.getElementById('locationLabel')
    };

    function normalise(value) {
      return String(value || '')
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '');
    }

    function formatDate(value) {
      if (!value) return '';
      const parts = String(value).split('-');
      if (parts.length !== 3) return value;
      return `${parts[2]}/${parts[1]}/${parts[0]}`;
    }
function todayLocalISO() {
  const now = new Date();
  const year = now.getFullYear();
  const month = String(now.getMonth() + 1).padStart(2, '0');
  const day = String(now.getDate()).padStart(2, '0');
  return `${year}-${month}-${day}`;
}
    function numberFromPrice(value) {
      if (typeof value === 'number') return value;
      const cleaned = String(value || '')
        .replace(',', '.')
        .replace(/[^0-9.]/g, '');
      return Number(cleaned || 0);
    }

    function asArray(value) {
      return Array.isArray(value) ? value : [];
    }

    function collectMenuText(menu) {
      return [
        menu.nombre,
        menu.precio,
        menu.descripcion,
        ...asArray(menu.primeros),
        ...asArray(menu.segundos),
        ...asArray(menu.postre),
        ...asArray(menu.platos),
        ...asArray(menu.incluye)
      ].join(' ');
    }

    function collectEntryText(entry) {
      const base = [
        entry.restaurante.nombre,
        entry.restaurante.categoria_cocina,
        entry.menu.titulo,
        entry.menu.descripcion,
        ...asArray(entry.menu.primeros),
        ...asArray(entry.menu.segundos),
        ...asArray(entry.menu.postre),
        ...asArray(entry.menu.platos),
        ...asArray(entry.menu.incluye),
        ...asArray(entry.menu.etiquetas)
      ];

      for (const submenu of asArray(entry.menu.menus)) {
        base.push(collectMenuText(submenu));
      }

      return base.join(' ');
    }

    function menuPrice(menu) {
      return Number(menu.precio_valor || numberFromPrice(menu.precio));
    }

    function singlePrice(entry) {
      return Number(entry.menu.precio_valor || numberFromPrice(entry.menu.precio));
    }

    function minimumPrice(entry) {
      if (entry.menu.tipo === 'multiple' && asArray(entry.menu.menus).length) {
        const prices = entry.menu.menus
          .map(menuPrice)
          .filter(price => price > 0);

        return prices.length ? Math.min(...prices) : 0;
      }

      return singlePrice(entry);
    }

    function entryIncludes(entry, word) {
      const mainIncludes = asArray(entry.menu.incluye).map(normalise);
      const submenuIncludes = asArray(entry.menu.menus)
        .flatMap(menu => asArray(menu.incluye))
        .map(normalise);

      return [...mainIncludes, ...submenuIncludes].includes(word);
    }

    function matchingSubmenus(entry, filters) {
      const submenus = asArray(entry.menu.menus);

      if (entry.menu.tipo !== 'multiple' || !submenus.length) {
        return [];
      }

      return submenus.filter(menu => {
        const price = menuPrice(menu);
        const text = normalise(collectMenuText(menu));
        const includes = asArray(menu.incluye).map(normalise);

        if (filters.maxPrice && price && price > filters.maxPrice) return false;
        if (filters.dish && !text.includes(filters.dish)) return false;
        if (filters.withDrink && !includes.includes('bebida')) return false;
        if (filters.withBread && !includes.includes('pan')) return false;

        return true;
      });
    }

    function filtersFromInputs() {
      return {
        restaurant: normalise(els.restaurant.value),
        dish: normalise(els.dish.value),
        maxPrice: Number(els.price.value || 0),
        updatedOnly: els.updatedOnly.checked,
        withDrink: els.withDrink.checked,
        withBread: els.withBread.checked
      };
    }

    function entryPasses(entry, filters) {
      const restaurantName = normalise(entry.restaurante.nombre);
      const fullText = normalise(collectEntryText(entry));

      if (filters.restaurant && !restaurantName.includes(filters.restaurant)) {
        return false;
      }

      if (entry.menu.tipo === 'multiple') {
        const matches = matchingSubmenus(entry, filters);
        if (filters.maxPrice || filters.dish || filters.withDrink || filters.withBread) {
          return matches.length > 0;
        }
        return true;
      }

      const price = singlePrice(entry);

      if (filters.dish && !fullText.includes(filters.dish)) return false;
      if (filters.maxPrice && price && price > filters.maxPrice) return false;
      if (filters.withDrink && !entryIncludes(entry, 'bebida')) return false;
      if (filters.withBread && !entryIncludes(entry, 'pan')) return false;

      return true;
    }

    function apply() {
      const filters = filtersFromInputs();

      state.filtered = state.all.filter(entry => {
        if (filters.updatedOnly && entry.fecha_menu && state.dataDate && entry.fecha_menu !== state.dataDate) {
          return false;
        }

        return entryPasses(entry, filters);
      });

      render(filters);
    }

    function esc(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function listHtml(items) {
      const safe = asArray(items).filter(Boolean);
      if (!safe.length) return '';
      return `<ul>${safe.map(item => `<li>${esc(item)}</li>`).join('')}</ul>`;
    }

    function menuColumnsHtml(menu) {
      const blocks = [];

      if (asArray(menu.primeros).length) {
        blocks.push(`
          <div>
            <p class="section-title">Primeros</p>
            ${listHtml(menu.primeros)}
          </div>
        `);
      }

      if (asArray(menu.segundos).length) {
        blocks.push(`
          <div>
            <p class="section-title">Segundos</p>
            ${listHtml(menu.segundos)}
          </div>
        `);
      }

      if (asArray(menu.postre).length) {
        blocks.push(`
          <div>
            <p class="section-title">Postre</p>
            ${listHtml(menu.postre)}
          </div>
        `);
      }

      if (!blocks.length && asArray(menu.platos).length) {
        blocks.push(`
          <div>
            <p class="section-title">Platos</p>
            ${listHtml(menu.platos)}
          </div>
        `);
      }

      return blocks.length ? `<div class="columns">${blocks.join('')}</div>` : '';
    }

    function includedHtml(menu) {
      const included = asArray(menu.incluye);

      if (included.length) {
        return `<p class="included">Incluye ${esc(included.join(', ').toLowerCase())}.</p>`;
      }

      if (menu.descripcion) {
        return `<p class="included">${esc(menu.descripcion)}</p>`;
      }

      return '';
    }

    function singleMenuHtml(entry) {
      const menu = entry.menu;
      const title = menu.titulo || menu.nombre || 'Menú del día';
      const price = menu.precio || (menu.precio_valor ? `${menu.precio_valor} €` : '');

      return `
        <div class="menu-block">
          <div class="menu-head">
            <div class="menu-name">${esc(title)}</div>
            ${price ? `<div class="menu-price">${esc(price)}</div>` : ''}
          </div>
          ${menuColumnsHtml(menu)}
          ${includedHtml(menu)}
        </div>
      `;
    }

    function multipleMenusHtml(entry, filters) {
      const allSubmenus = asArray(entry.menu.menus);
      const matches = matchingSubmenus(entry, filters);
      const filteredByMenu = filters.maxPrice || filters.dish || filters.withDrink || filters.withBread;
      const visibleMenus = filteredByMenu ? matches : allSubmenus;

      return visibleMenus.map(menu => {
        const label = `${menu.nombre || 'Menú'}${menu.precio ? ' · ' + menu.precio : ''}`;

        return `
          <div class="menu-block">
            <div class="menu-head">
              <div class="menu-name">${esc(menu.nombre || 'Menú')}</div>
              ${menu.precio ? `<div class="menu-price">${esc(menu.precio)}</div>` : ''}
            </div>
            ${menuColumnsHtml(menu)}
            ${includedHtml(menu)}
            ${filteredByMenu ? `<div class="match">Cumple por: ${esc(label)}</div>` : ''}
          </div>
        `;
      }).join('');
    }

    function cardHtml(entry, filters) {
      const restaurant = entry.restaurante;
      const isMultiple = entry.menu.tipo === 'multiple' && asArray(entry.menu.menus).length;
      const menusHtml = isMultiple ? multipleMenusHtml(entry, filters) : singleMenuHtml(entry);
      const minPrice = minimumPrice(entry);

      return `
        <article class="card">
          <div>
            <h2>${esc(restaurant.nombre)}</h2>

            <div class="meta">
  ${restaurant.direccion ? `<span class="pill">📍 ${esc(restaurant.direccion)}</span>` : ''}
  ${restaurant.categoria_cocina ? `<span class="pill">🍲 ${esc(restaurant.categoria_cocina)}</span>` : ''}
  ${minPrice ? `<span class="pill">Menú desde ${esc(String(minPrice).replace('.', ','))} €</span>` : ''}
</div>

            <div class="menus">
              ${menusHtml}
            </div>
          </div>

          <div class="actions">
            <a class="button" href="${esc(restaurant.url_publica || '#')}">Ver ficha</a>
          </div>
        </article>
      `;
    }

    function render(filters = filtersFromInputs()) {
      els.countLabel.textContent = `${state.filtered.length} resultado${state.filtered.length === 1 ? '' : 's'}`;

      if (!state.filtered.length) {
        els.results.innerHTML = `
          <div class="empty">
            No hay menús que cumplan esos filtros. Prueba con otro plato, restaurante o precio.
          </div>
        `;
        return;
      }

      els.results.innerHTML = state.filtered
        .map(entry => cardHtml(entry, filters))
        .join('');
    }

    function mapEntry(item, data) {
      const restaurant = item.restaurante || {};
      const menu = item.menu || {};

      return {
        restaurante: {
          nombre: restaurant.nombre || 'Restaurante',
          slug: restaurant.slug || '',
          direccion: restaurant.direccion || '',
          telefono_publico: restaurant.telefono_publico || '',
          categoria_cocina: restaurant.categoria_cocina || '',
          url_publica: restaurant.url_publica || (restaurant.slug ? `../restaurantes/${restaurant.slug}/` : '#')
        },
        menu: {
          id: menu.id || '',
          titulo: menu.titulo || 'Menú del día',
          estado: menu.estado || '',
          tipo: menu.tipo || 'simple',
          precio: menu.precio || '',
          precio_valor: Number(menu.precio_valor || numberFromPrice(menu.precio)),
          descripcion: menu.descripcion || '',
          primeros: asArray(menu.primeros),
          segundos: asArray(menu.segundos),
          postre: asArray(menu.postre),
          platos: asArray(menu.platos),
          incluye: asArray(menu.incluye),
          etiquetas: asArray(menu.etiquetas),
          menus: asArray(menu.menus).map(submenu => ({
            nombre: submenu.nombre || 'Menú',
            precio: submenu.precio || '',
            precio_valor: Number(submenu.precio_valor || numberFromPrice(submenu.precio)),
            descripcion: submenu.descripcion || '',
            primeros: asArray(submenu.primeros),
            segundos: asArray(submenu.segundos),
            postre: asArray(submenu.postre),
            platos: asArray(submenu.platos),
            incluye: asArray(submenu.incluye)
          }))
        },
        fecha_menu: menu.fecha || data.fecha || ''
      };
    }

    async function load() {
      try {
        const response = await fetch('../data/menus-hoy/hoyo-de-manzanares.json', { cache: 'no-store' });

        if (!response.ok) {
          throw new Error(`No se pudo cargar el JSON público: ${response.status}`);
        }

        const data = await response.json();

        state.localidad = data.localidad || null;
        state.dataDate = data.fecha || '';
     state.all = asArray(data.menus).map(item => mapEntry(item, data));
state.filtered = [];

if (state.localidad && state.localidad.nombre) {
  els.locationLabel.textContent = `Menús en ${state.localidad.nombre}`;
}

els.dateLabel.textContent = `Fecha: ${formatDate(todayLocalISO())}`;

els.countLabel.textContent = 'Busca por restaurante, plato o precio';
els.results.innerHTML = `
  <div class="empty">
    Introduce una búsqueda para ver los menús disponibles.
  </div>
`;
      } catch (error) {
        els.countLabel.textContent = 'Error al cargar menús';
        els.results.innerHTML = `
          <div class="error">
            No se pudo cargar el buscador. Revisa el archivo JSON público o la ruta de datos.
            <br><br>
            Detalle: ${esc(error.message)}
          </div>
        `;
      }
    }

    for (const input of [
      els.restaurant,
      els.dish,
      els.price,
      els.updatedOnly,
      els.withDrink,
      els.withBread
    ]) {
      input.addEventListener('input', apply);
      input.addEventListener('change', apply);
    }
for (const button of document.querySelectorAll('[data-restaurant]')) {

  button.addEventListener('click', () => {

    els.restaurant.value = button.dataset.restaurant;

    apply();

    document.querySelector('.summary').scrollIntoView({

      behavior: 'smooth',

      block: 'start'

    });

  });

}
    load();
  </script>
</body>
</html>
